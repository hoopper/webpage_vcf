<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCF Generator PRO++ Mobile</title>
    
    <!-- Configuración para PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3771/3771518.png">
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .input-field { @apply w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all mb-3 text-base; }
        
        /* Botones Principales Balanceados */
        .btn-primary { @apply bg-blue-600 active:scale-95 text-white font-semibold py-4 px-4 rounded-xl transition-all flex items-center justify-center gap-3 flex-1 shadow-lg shadow-blue-200; }
        .btn-outline { @apply bg-white border-2 border-blue-600 active:scale-95 text-blue-600 font-semibold py-4 px-4 rounded-xl transition-all flex items-center justify-center gap-3 flex-1; }
        
        /* Estilos de Filas Dinámicas */
        .btn-secondary { @apply bg-slate-100 active:scale-95 text-slate-700 font-medium py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2 mt-2 w-full; }
        .delete-btn { @apply p-3 text-red-500 active:bg-red-50 rounded-lg transition-colors flex items-center justify-center self-center; }
        .row-item { @apply flex gap-2 items-center mb-3 animate-in fade-in slide-in-from-top-1 duration-200; }
        
        /* Iconos Centrados */
        .icon-container { @apply p-3 bg-blue-600 text-white rounded-2xl shadow-xl flex items-center justify-center; }
        h2 i, h2 svg { display: inline-flex; align-self: center; }
    </style>
</head>
<body class="pb-44">

    <div class="max-w-md mx-auto px-4 pt-6">
        <!-- Encabezado -->
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">VCF Gen Pro</h1>
                <p class="text-slate-500 text-sm">Edita y comparte contactos</p>
            </div>
            <div class="icon-container">
                <i data-lucide="contact-2" class="w-6 h-6"></i>
            </div>
        </header>

        <div class="card p-6 mb-6">
            <!-- Sección Identidad -->
            <h2 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="user" class="w-5 h-5 text-blue-500"></i> Identidad
            </h2>
            <input id="nombre" placeholder="Nombre" oninput="updateAll()" class="input-field">
            <input id="apellidos" placeholder="Apellidos" oninput="updateAll()" class="input-field">
            
            <!-- Sección Teléfonos -->
            <h2 class="text-lg font-semibold text-slate-800 mb-4 mt-6 flex items-center gap-2">
                <i data-lucide="phone" class="w-5 h-5 text-blue-500"></i> Teléfonos
            </h2>
            <div id="telefonos"></div>
            <button onclick="addTelefono()" class="btn-secondary">
                <i data-lucide="plus" class="w-4 h-4"></i> Añadir Teléfono
            </button>

            <!-- Sección Correos -->
            <h2 class="text-lg font-semibold text-slate-800 mb-4 mt-6 flex items-center gap-2">
                <i data-lucide="mail" class="w-5 h-5 text-blue-500"></i> Correos
            </h2>
            <div id="emails"></div>
            <button onclick="addEmail()" class="btn-secondary">
                <i data-lucide="plus" class="w-4 h-4"></i> Añadir Email
            </button>

            <!-- Sección Dirección Postal -->
            <h2 class="text-lg font-semibold text-slate-800 mb-4 mt-6 flex items-center gap-2">
                <i data-lucide="map-pin" class="w-5 h-5 text-blue-500"></i> Dirección Postal
            </h2>
            <input id="direccion" placeholder="Calle, ciudad, CP, País..." oninput="updateAll()" class="input-field">

            <!-- Sección Web -->
            <h2 class="text-lg font-semibold text-slate-800 mb-4 mt-6 flex items-center gap-2">
                <i data-lucide="globe" class="w-5 h-5 text-blue-500"></i> Sitio Web
            </h2>
            <input id="web" type="url" placeholder="https://www.tusitio.com" oninput="updateAll()" class="input-field">

            <!-- Sección Notas -->
            <h2 class="text-lg font-semibold text-slate-800 mb-4 mt-6 flex items-center gap-2">
                <i data-lucide="sticky-note" class="w-5 h-5 text-blue-500"></i> Notas
            </h2>
            <textarea id="notas" placeholder="Anotaciones extra..." oninput="updateAll()" class="input-field h-24 resize-none"></textarea>
        </div>

        <!-- Visualización QR -->
        <div class="card p-6 mb-12 flex flex-col items-center justify-center text-center">
            <h2 class="text-lg font-semibold text-slate-800 mb-4">Escanea para Guardar</h2>
            <div id="qrcode" class="bg-white p-2 border rounded-xl mb-4 flex items-center justify-center"></div>
            <p class="text-[10px] text-slate-400 font-mono uppercase tracking-widest" id="preview-name">NUEVO CONTACTO</p>
        </div>

        <!-- Barra Inferior Fija (Centrada) -->
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/95 backdrop-blur-md border-t border-slate-100 z-50">
            <div class="max-w-md mx-auto flex gap-4 items-center justify-center">
                <!-- Abrir Archivo -->
                <label class="btn-outline cursor-pointer shadow-sm">
                    <i data-lucide="folder-open" class="w-5 h-5"></i>
                    <span>Abrir VCF</span>
                    <input type="file" class="hidden" accept=".vcf" onchange="cargarArchivo(event)">
                </label>
                <!-- Guardar Archivo -->
                <button onclick="descargarVCF()" class="btn-primary shadow-lg">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    <span>Guardar</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Helper para limpiar caracteres especiales en VCF
        function limpiar(v){ return v ? v.trim().replace(/,/g, '\\,').replace(/\n/g, '\\n') : ""; }

        // -------- LECTURA DE ARCHIVOS --------
        function cargarArchivo(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => parseVCF(event.target.result);
            reader.readAsText(file);
        }

        function parseVCF(text) {
            // Resetear UI
            document.getElementById("nombre").value = "";
            document.getElementById("apellidos").value = "";
            document.getElementById("direccion").value = "";
            document.getElementById("web").value = "";
            document.getElementById("notas").value = "";
            document.getElementById("telefonos").innerHTML = "";
            document.getElementById("emails").innerHTML = "";

            const lines = text.split(/\r?\n/);
            lines.forEach(line => {
                if (line.startsWith("N:")) {
                    const parts = line.substring(2).split(";");
                    document.getElementById("apellidos").value = (parts[0] || "").replace(/\\,/g, ',');
                    document.getElementById("nombre").value = (parts[1] || "").replace(/\\,/g, ',');
                }
                if (line.startsWith("TEL")) {
                    const tipo = (line.match(/TYPE=([^:;]+)/) || [])[1] || "CELL";
                    const num = line.split(":")[1];
                    if(num) addTelefono(tipo, num);
                }
                if (line.startsWith("EMAIL")) {
                    const tipo = (line.match(/TYPE=([^:;]+)/) || [])[1] || "INTERNET";
                    const val = line.split(":")[1];
                    if(val) addEmail(tipo, val);
                }
                if (line.startsWith("ADR")) {
                    const adrRaw = line.split(":")[1] || "";
                    const cleanAdr = adrRaw.split(";").filter(x => x).join(", ").replace(/\\,/g, ',');
                    document.getElementById("direccion").value = cleanAdr;
                }
                if (line.startsWith("URL")) {
                    document.getElementById("web").value = line.split(":")[1] || "";
                }
                if (line.startsWith("NOTE")) {
                    document.getElementById("notas").value = (line.split(":")[1] || "").replace(/\\n/g, '\n').replace(/\\,/g, ',');
                }
            });
            updateAll();
        }

        // -------- CONSTRUCTORES DE UI DINÁMICA --------
        function addTelefono(tipo="CELL", valor=""){
            const div = document.createElement("div");
            div.className = "row-item";
            div.innerHTML = `
                <select class="w-24 bg-slate-50 border rounded-lg p-3 text-xs outline-none" onchange="updateAll()">
                    <option value="CELL">Móvil</option>
                    <option value="WORK">Trabajo</option>
                    <option value="HOME">Casa</option>
                </select>
                <input value="${valor}" type="tel" placeholder="Número" oninput="updateAll()" class="w-full px-3 py-3 border rounded-lg text-sm mb-0 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="this.parentElement.remove(); updateAll();" class="delete-btn">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            `;
            div.querySelector('select').value = tipo;
            document.getElementById("telefonos").appendChild(div);
            lucide.createIcons();
            updateAll();
        }

        function addEmail(tipo="INTERNET", valor=""){
            const div = document.createElement("div");
            div.className = "row-item";
            div.innerHTML = `
                <select class="w-24 bg-slate-50 border rounded-lg p-3 text-xs outline-none" onchange="updateAll()">
                    <option value="INTERNET">Personal</option>
                    <option value="WORK">Trabajo</option>
                </select>
                <input value="${valor}" type="email" placeholder="Email" oninput="updateAll()" class="w-full px-3 py-3 border rounded-lg text-sm mb-0 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="this.parentElement.remove(); updateAll();" class="delete-btn">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            `;
            div.querySelector('select').value = tipo;
            document.getElementById("emails").appendChild(div);
            lucide.createIcons();
            updateAll();
        }

        // -------- PROCESAMIENTO Y QR --------
        function generarVCF(){
            let vcf = "BEGIN:VCARD\nVERSION:3.0\n";
            const n = document.getElementById("nombre").value;
            const a = document.getElementById("apellidos").value;
            const dir = document.getElementById("direccion").value;
            const web = document.getElementById("web").value;
            const notas = document.getElementById("notas").value;

            if(n || a) {
                vcf += `N:${limpiar(a)};${limpiar(n)};;;\nFN:${limpiar(n)} ${limpiar(a)}\n`;
            }
            document.querySelectorAll("#telefonos .row-item").forEach(r => {
                const t = r.querySelector('select').value;
                const v = r.querySelector('input').value;
                if(v) vcf += `TEL;TYPE=${t}:${v}\n`;
            });
            document.querySelectorAll("#emails .row-item").forEach(r => {
                const t = r.querySelector('select').value;
                const v = r.querySelector('input').value;
                if(v) vcf += `EMAIL;TYPE=${t}:${v}\n`;
            });
            
            if(dir) vcf += `ADR;TYPE=HOME:;;${limpiar(dir)};;;;\n`;
            if(web) vcf += `URL:${web}\n`;
            if(notas) vcf += `NOTE:${limpiar(notas)}\n`;
            
            vcf += "END:VCARD";
            return vcf;
        }

        function updateAll(){
            const v = generarVCF();
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { 
                text: v, 
                width: 220, 
                height: 220,
                colorDark : "#1e293b",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });
            const nombreFull = (document.getElementById("nombre").value + " " + document.getElementById("apellidos").value).trim();
            document.getElementById("preview-name").innerText = nombreFull || "NUEVO CONTACTO";
        }

        function descargarVCF(){
            const content = generarVCF();
            const blob = new Blob([content], {type: "text/vcard"});
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            const filename = (document.getElementById("nombre").value || "contacto").trim();
            link.download = filename + ".vcf";
            link.click();
            URL.revokeObjectURL(url);
        }

        // Estado inicial
        window.onload = () => { 
            addTelefono(); 
            updateAll(); 
        };
    </script>
</body>
</html>
